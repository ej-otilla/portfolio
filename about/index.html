<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evan James Otilla | About</title>
    <script src="https://kit.fontawesome.com/6085f1fa62.js" crossorigin="anonymous"></script>
    <!-- Favicons ---------------------------------------------------------------------------->
    <!-- Added multiple favicons in different sizes for compatibility with various devices. -->
    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" href="../assets/favicon/favicon-16x16.png" sizes="16x16">
    <link rel="icon" type="image/png" href="../assets/favicon/favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="../assets/favicon/apple-touch-icon-180x180.png" sizes="180x180">
    <link rel="icon" type="image/png" href="../assets/favicon/android-chrome-192x192.png" sizes="192x192">
    <link rel="icon" type="image/png" href="../assets/favicon/android-chrome-512x512.png" sizes="512x512">
</head>

<body>
    <!-- Navigation Bar ----------------------------------------------------------------->
    <!-- The logo will be left-aligned, the 'Projects' and 'About' links will be centered, and 'Start Your Project →' will be right-aligned with a distinct design to direct users to the footer's contact form instead of another page. -->
    <header>
        <div class="nav-logo">
            <a href="/"><img src="../assets/logo.png" loading="lazy" alt="Stylized logo with angular lines and curves in a sage green color, forming the letters 'E' and 'J' in a minimalist design."></a>
        </div>
        <nav aria-label="Navigation Menu">
            <ul>
                <li><a href="/projects/">Projects</a></li>
                <li><a href="/about/">About</a></li>
                <li><a href="#footer">Start Your Project →</a></li>
            </ul>
        </nav>
    </header>

    <footer id="footer">
        <!-- Contact Form ------------------------------------------------------------------------>
        <!-- Initially, everything except the heading and the 'Let's Chat' button will be visible. When the user clicks the button, the hidden form will be revealed. -->
        <div class="contact-form-wrapper">
            <h2 class="contact-form-heading">Have an idea for a project?</h2>
            <div class="cta-button-container">
                <button class="cta-button" type="button">Let's Chat</button>
            </div>
            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" maxlength="256" spellcheck="false" autocapitalize="none" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" maxlength="256" spellcheck="false" autocapitalize="none" required>
                <label for="help-box">How can I help?</label>
                <textarea id="help-box" name="help-box" maxlength="2500" autocapitalize="none" required></textarea>
                <input type="submit" data-wait="Please wait..." class="submit-button" value="Submit">
            </form>
        </div>
        <!-- Social Media Icons ------------------------------------------------------------------>
        <div class="social-icons">
            <a href="https://www.linkedin.com/in/ej-otilla/" class="fa-brands fa-linkedin fa-2x" aria-label="LinkedIn Profile" target="_blank"></a>
            <a href="https://www.github.com/ej-otilla" class="fa-brands fa-github fa-2x" aria-label="GitHub Profile" target="_blank"></a>
        </div>
        <!-- Copyright --------------------------------------------------------------------------->
        <div class="copyright">&copy; 2024 Evan James Otilla. All Rights Reserved.</div>
    </footer>
</body>

</html>
